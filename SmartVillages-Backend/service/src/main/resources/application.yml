spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/smartVillage?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 0
  web:
    resources:
      add-mappings: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto


knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: smartVillages
  expiration-ms: 86400000 # 24 小时（毫秒）

aliyun:
  oss:
    endpoint:你的域名
    bucket-name:你的存储空间
    access-key-id:你的密钥id
    access-key-secret:你的密钥密码