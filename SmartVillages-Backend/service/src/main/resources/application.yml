spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/smartVillage?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  web:
    resources:
      add-mappings: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto


knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: smartVillages
  expiration-ms: 86400000 # 24 小时（毫秒）
