spring:
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/smartVillage?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: root
    password: your_db_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: your_redis_password
      database: 0

cache:
  ttl:
    detail-minutes: 5
    list-minutes: 10
    null-marker-minutes: 2
    detail-jitter-seconds: 300

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: smartVillages
  expiration-ms: 86400000

aliyun:
  oss:
    endpoint: oss-cn-shanghai.aliyuncs.com
    bucket-name: your_bucket_name
    access-key-id: your_access_key_id
    access-key-secret: your_access_key_secret

